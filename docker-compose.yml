# Local Telegram Bot API Server
# Tài liệu: https://core.telegram.org/bots/api#using-a-local-bot-api-server
#
# Lợi ích:
#   - Upload file lên đến 2 GB (thay vì 50 MB)
#   - Download file lên đến 2 GB (thay vì 20 MB)
#   - Bot có thể nhận webhook qua HTTP
#
# Yêu cầu:
#   - TG_API_ID và TG_API_HASH: lấy tại https://my.telegram.org/apps
#   - (Chỉ cần cho local server — bot code không cần)
#
# Khởi động lần đầu:
#   1. docker compose up -d
#   2. Chạy script migrate nếu bot đang dùng official API:
#      curl "https://api.telegram.org/bot<TOKEN>/logOut"
#   3. Sau đó khởi động bot với TG_LOCAL_SERVER=http://localhost:8081

services:
  zalo-tg:
    build: .
    image: zalo-tg:latest
    container_name: zalo-tg
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - ZALO_CREDENTIALS_PATH=/app/data/credentials.json
    volumes:
      # Persistent data — lưu topics.json + credentials.json
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
